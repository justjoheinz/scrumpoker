<VirtualHost *:80>
    ProxyRequests Off
    ProxyPreserveHost On

    # WebSocket upgrade for Socket.io
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^/scrumpoker/(.*) ws://scrumpoker:3001/scrumpoker/$1 [P,L]

    ProxyPass /scrumpoker http://scrumpoker:3001/scrumpoker
    ProxyPassReverse /scrumpoker http://scrumpoker:3001/scrumpoker
</VirtualHost>
